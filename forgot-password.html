<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลืมรหัสผ่าน — ตลาดนัดออนไลน์</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="brand" href="index.html">
      <span class="brand-mark">ต</span>
      <span class="brand-text">ตลาดนัดออนไลน์<small>ซื้อง่าย ขายคล่อง ในที่เดียว</small></span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" data-static>หน้าร้าน</a>
      <a href="sell.html" class="primary" data-static>+ ลงขายของฉัน</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top:60px;">
  <div class="form-card narrow">
    <p class="eyebrow" style="text-align:center;">ลืมรหัสผ่านใช่ไหม?</p>
    <h1 style="font-family:var(--font-display); font-size:24px; text-align:center; margin-top:0; color:var(--teal-900);">รีเซ็ตรหัสผ่าน</h1>
    <p class="hint" style="text-align:center; margin-top:-6px; margin-bottom:20px;">กรอกอีเมลที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้ทางอีเมล</p>

    <div class="alert" id="alertBox"></div>

    <form id="forgotForm">
      <div class="field">
        <label for="email">อีเมล</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="sendBtn">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
      <p class="hint" style="text-align:center; margin-top:14px;">นึกรหัสผ่านออกแล้ว? <a href="login.html" style="color:var(--teal-700); font-weight:600;">เข้าสู่ระบบ</a></p>
    </form>
  </div>
</main>

<footer class="site-footer">
  <div class="container">ตลาดนัดออนไลน์ · ขับเคลื่อนด้วย Supabase</div>
</footer>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/forgot-password.js"></script>
</body>
</html>
