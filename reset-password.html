<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งรหัสผ่านใหม่ — ตลาดนัดออนไลน์</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="brand" href="index.html">
      <span class="brand-mark">ต</span>
      <span class="brand-text">ตลาดนัดออนไลน์<small>ซื้อง่าย ขายคล่อง ในที่เดียว</small></span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html" data-static>หน้าร้าน</a>
      <a href="sell.html" class="primary" data-static>+ ลงขายของฉัน</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-top:60px;">
  <div class="form-card narrow">
    <p class="eyebrow" style="text-align:center;">ขั้นตอนสุดท้าย</p>
    <h1 style="font-family:var(--font-display); font-size:24px; text-align:center; margin-top:0; color:var(--teal-900);">ตั้งรหัสผ่านใหม่</h1>

    <div class="alert" id="alertBox"></div>

    <form id="resetForm" style="display:none;">
      <div class="field">
        <label for="password">รหัสผ่านใหม่</label>
        <input type="password" id="password" required minlength="6" placeholder="อย่างน้อย 6 ตัวอักษร">
      </div>
      <div class="field">
        <label for="passwordConfirm">ยืนยันรหัสผ่านใหม่</label>
        <input type="password" id="passwordConfirm" required minlength="6" placeholder="พิมพ์รหัสผ่านอีกครั้ง">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="resetBtn">บันทึกรหัสผ่านใหม่</button>
    </form>

    <p class="hint" id="linkExpiredHint" style="text-align:center; display:none;">
      <a href="forgot-password.html" style="color:var(--teal-700); font-weight:600;">ขอลิงก์รีเซ็ตรหัสผ่านใหม่อีกครั้ง</a>
    </p>
  </div>
</main>

<footer class="site-footer">
  <div class="container">ตลาดนัดออนไลน์ · ขับเคลื่อนด้วย Supabase</div>
</footer>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/reset-password.js"></script>
</body>
</html>
